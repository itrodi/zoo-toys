<!doctype html>
<html lang="en">
<head>

  <title>Overcharge Dash 3D</title>
  <style>
    :root {
      --accent: #36f1d2;
      --text: #e9f2ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, #bfe6ff 0%, #7db7e8 55%, #3e6b9e 100%);
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      color: var(--text);
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #frame {
      width: min(90vw, 60vh);
      max-height: 95vh;
      aspect-ratio: 2 / 3;
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      background: #101b2b;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(255,255,255,0.05);
    }
    #game {
      width: 100%;
      height: 100%;
    }
    #game canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px;
    }
    #topbar {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.6px;
      gap: 8px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 8px rgba(0,0,0,0.2);
    }
    #score { justify-self: start; }
    #energy { justify-self: end; }
    #health {
      justify-self: center;
      width: 120px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: inset 0 0 6px rgba(0,0,0,0.25);
    }
    #healthFill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff5f5f, #ffb347);
      box-shadow: 0 0 10px rgba(255,95,95,0.45);
      transition: width 0.12s linear;
    }
    #energy {
      width: 120px;
      height: 32px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      background: radial-gradient(ellipse at 50% 25%, rgba(102,242,255,0.08) 0%, rgba(10,18,32,0.88) 70%);
    }
    #overlay.hidden { display: none; }
    .card {
      max-width: 340px;
      background: linear-gradient(165deg, rgba(20,38,65,0.95), rgba(8,18,36,0.92));
      border: 1px solid rgba(102,242,255,0.15);
      border-radius: 22px;
      padding: 28px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(102,242,255,0.05);
      backdrop-filter: blur(12px);
    }
    .card::before {
      content: "";
      display: block;
      width: 60px;
      height: 3px;
      margin: 0 auto 16px auto;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #66f2ff, transparent);
      box-shadow: 0 0 16px rgba(102,242,255,0.5);
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff, #66f2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 20px;
      line-height: 1.5;
      letter-spacing: 0.3px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #66f2ff, #2be7c1, #36d6a8);
      background-size: 200% 200%;
      color: #0b1320;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      box-shadow: 0 8px 24px rgba(43,231,193,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
      animation: btnShimmer 3s ease-in-out infinite;
    }
    @keyframes btnShimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

</head>

    function loadTexture(url, fallbackColor = "#ffffff") {
      return new Promise((resolve) => {
        const loader = new THREE.TextureLoader();
        let done = false;
        const fallback = createSolidTexture(fallbackColor);
        const finish = (tex) => {
          if (done) return;
          done = true;
          resolve(tex || fallback);
        };
        const timeout = setTimeout(() => finish(fallback), 5000);
        loader.load(
          url,
          (tex) => {
            clearTimeout(timeout);
            tex.colorSpace = THREE.SRGBColorSpace;
            finish(tex);
          },
          undefined,
          () => {
            clearTimeout(timeout);
            finish(fallback);
          }
        );
      });
    }

        5122: Int16Array,
        5123: Uint16Array,
        5125: Uint32Array,

      const ArrayType = componentMap[accessor.componentType] || Float32Array;
      const length = accessor.count * typeSize;
      const array = new ArrayType(buffer, byteOffset, length);
      return { accessor, array, itemSize: typeSize };

        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color(color[0], color[1], color[2]),
          roughness: mat?.pbrMetallicRoughness?.roughnessFactor ?? 1,
          metalness: mat?.pbrMetallicRoughness?.metallicFactor ?? 0,
          transparent: color[3] < 0.99,
          opacity: color[3] ?? 1
        });
        return material;
      });

      const meshes = (gltf.meshes || []).map((mesh) => {
        const group = new THREE.Group();
        mesh.primitives.forEach((prim) => {
          const geom = new THREE.BufferGeometry();
          if (prim.attributes.POSITION != null) {
            const pos = readAccessor(gltf, buffers, prim.attributes.POSITION);
            geom.setAttribute("position", new THREE.BufferAttribute(pos.array, pos.itemSize));
          }
          if (prim.attributes.NORMAL != null) {
            const norm = readAccessor(gltf, buffers, prim.attributes.NORMAL);
            geom.setAttribute("normal", new THREE.BufferAttribute(norm.array, norm.itemSize));
          }
          if (prim.attributes.TEXCOORD_0 != null) {
            const uv = readAccessor(gltf, buffers, prim.attributes.TEXCOORD_0);
            geom.setAttribute("uv", new THREE.BufferAttribute(uv.array, uv.itemSize));
          }
          if (prim.indices != null) {
            const idx = readAccessor(gltf, buffers, prim.indices);
            geom.setIndex(new THREE.BufferAttribute(idx.array, 1));
          }
          geom.computeBoundingSphere();
          const mat = materials[prim.material ?? 0] || new THREE.MeshStandardMaterial({ color: 0xffffff });
          const meshObj = new THREE.Mesh(geom, mat);
          group.add(meshObj);
        });
        return group;
      });

      function buildNode(nodeIndex) {
        const node = gltf.nodes[nodeIndex];
        const container = new THREE.Group();
        if (node.translation) container.position.fromArray(node.translation);
        if (node.rotation) container.quaternion.fromArray(node.rotation);
        if (node.scale) container.scale.fromArray(node.scale);
        if (node.mesh != null) {
          const mesh = meshes[node.mesh];
          if (mesh) container.add(mesh.clone(true));
        }
        if (node.children) {
          node.children.forEach((child) => container.add(buildNode(child)));
        }
        return container;
      }

      const scene = gltf.scenes?.[gltf.scene ?? 0];
      const root = new THREE.Group();
      if (scene?.nodes?.length) {
        scene.nodes.forEach((nodeIndex) => root.add(buildNode(nodeIndex)));
      } else if (meshes[0]) {
        root.add(meshes[0]);
      }
      return root;
    }

    function prepareKenneyTile(tile) {
      tile.updateMatrixWorld(true);
      const bbox = new THREE.Box3().setFromObject(tile);
      const center = new THREE.Vector3();
      const size = new THREE.Vector3();
      bbox.getCenter(center);
      bbox.getSize(size);
      const offset = center.clone().multiplyScalar(-1);
      return { tile, size, offset };
    }

    function loadKenneyTile(key) {
      return new Promise((resolve, reject) => {
        try {
          const data = KENNEY_GLTFS[key];
          if (!data) throw new Error(`Missing Kenney tile ${key}`);
          const root = parseKenneyGltf(data);
          root.traverse((obj) => {
            if (obj.isMesh) {
              obj.material = obj.material.clone();
              obj.material.color.multiplyScalar(1.05);
            }
          });
          resolve(root);
        } catch (err) {
          reject(err);
        }
      });
    }

    async function loadKenneyTiles() {
      const [road, grass, hillA, hillB] = await Promise.all([
        loadKenneyTile("road"),
        loadKenneyTile("grass"),
        loadKenneyTile("hillA"),
        loadKenneyTile("hillB")
      ]);
      kenneyTiles.road = prepareKenneyTile(road);
      kenneyTiles.grass = prepareKenneyTile(grass);
      kenneyTiles.hills = [prepareKenneyTile(hillA), prepareKenneyTile(hillB)];
      buildKenneyRoad();
      buildKenneyGrass();
      buildKenneyHills();
      if (roadMesh) roadMesh.visible = false;
      if (groundMesh) groundMesh.visible = false;
      if (playerSprite) playerSprite.position.y = surfaceY + 0.2;
    }

    function buildKenneyRoad() {
      if (!kenneyTiles.road) return;
      const { tile, size, offset } = kenneyTiles.road;
      roadVisualWidth = roadWidth + 0.9;
      const scale = roadVisualWidth / size.x;
      kenneyScale = scale;
      surfaceY = size.y * scale * 0.5 + 0.1;
      roadSegmentLength = size.z * scale;
      roadLead = Math.max(roadSegmentLength * 2.5, (camera?.position?.z || 10) + roadSegmentLength);
      const count = Math.ceil((roadLength + roadLead) / roadSegmentLength) + 6;
      for (let i = 0; i < count; i++) {
        const seg = tile.clone(true);
        seg.scale.setScalar(scale);
        seg.position.set(offset.x * scale, offset.y * scale + 0.02, offset.z * scale + roadLead - i * roadSegmentLength);
        scene.add(seg);
        roadSegments.push(seg);
      }
    }

    function buildKenneyGrass() {
      if (!kenneyTiles.grass) return;
      const { tile, size, offset } = kenneyTiles.grass;
      const scale = kenneyScale;
      grassSegmentLength = size.z * scale;
      grassSegmentCount = Math.ceil((roadLength + roadLead) / grassSegmentLength) + 6;
      const tileWidth = size.x * scale;
      const roadHalf = roadVisualWidth / 2;
      for (let i = 0; i < grassSegmentCount; i++) {
        for (const side of [-1, 1]) {
          const chunk = tile.clone(true);
          chunk.scale.setScalar(scale);
          chunk.position.set(
            side * (roadHalf + tileWidth / 2 - 0.2) + offset.x * scale,
            offset.y * scale,
            offset.z * scale + roadLead - i * grassSegmentLength
          );
          scene.add(chunk);
          grassChunks.push(chunk);
        }
      }
    }

    function buildKenneyHills() {
      if (!kenneyTiles.hills?.length) return;
      for (let i = 0; i < 10; i++) {
        const source = kenneyTiles.hills[i % kenneyTiles.hills.length];
        const hill = source.tile.clone(true);
        const scale = 6 + Math.random() * 4;
        hill.scale.setScalar(scale);
        const side = Math.random() < 0.5 ? -1 : 1;
        hill.position.set(
          side * (roadWidth / 2 + 12 + Math.random() * 10) + source.offset.x * scale,
          source.offset.y * scale - 0.05,
          source.offset.z * scale - 60 - Math.random() * 180
        );
        scene.add(hill);
        hillSegments.push({ mesh: hill, speed: 0.12 + Math.random() * 0.12 });
      }
    }

    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x7dc0f5);
      scene.fog = new THREE.Fog(0xc8e6ff, 15, 200);

      camera = new THREE.PerspectiveCamera(60, 2 / 3, 0.1, 300);
      camera.position.set(0, 5.5, 12);
      camera.lookAt(0, 1.5, -30);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      gameEl.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xfff8f0, 0.85);
      scene.add(ambient);
      const dir = new THREE.DirectionalLight(0xfff4e0, 1.0);
      dir.position.set(8, 14, 6);
      scene.add(dir);
      const fill = new THREE.DirectionalLight(0xb0d4f1, 0.3);
      fill.position.set(-6, 6, -4);
      scene.add(fill);

      // sky dome + stars
      const skyTex = createSkyTexture();
      skyDome = new THREE.Mesh(
        new THREE.SphereGeometry(160, 32, 16),
        new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide })
      );
      scene.add(skyDome);

      // sun
      sunMesh = new THREE.Mesh(
        new THREE.SphereGeometry(7, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xfff8d6 })
      );
      sunMesh.position.set(30, 28, -130);
      // sun glow halo
      const sunGlow = new THREE.Mesh(
        new THREE.SphereGeometry(12, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xfff0b8, transparent: true, opacity: 0.15 })
      );
      sunGlow.position.copy(sunMesh.position);
      scene.add(sunGlow);
      scene.add(sunMesh);

      const groundTex = createGroundTexture();
      const groundMat = new THREE.MeshLambertMaterial({ map: groundTex });
      const groundGeo = new THREE.PlaneGeometry(40, roadLength);
      groundMesh = new THREE.Mesh(groundGeo, groundMat);
      groundMesh.rotation.x = -Math.PI / 2;
      groundMesh.position.z = -roadLength / 2 + 10;
      scene.add(groundMesh);

      const roadTex = createRoadTexture();
      const roadMat = new THREE.MeshLambertMaterial({ map: roadTex, transparent: true, opacity: 0.95, depthWrite: false });
      const roadGeo = new THREE.PlaneGeometry(roadWidth, roadLength);
      roadMesh = new THREE.Mesh(roadGeo, roadMat);
      roadMesh.rotation.x = -Math.PI / 2;
      roadMesh.position.y = 0.08;
      roadMesh.position.z = -roadLength / 2 + 10;
      scene.add(roadMesh);

      loadKenneyTiles().catch((err) => console.warn("Kenney tiles failed", err));

      // distant mountains
      const mountainTex = createMountainTexture();
      mountainTex.wrapS = THREE.RepeatWrapping;
      mountainTex.wrapT = THREE.ClampToEdgeWrapping;
      mountainTex.repeat.set(2, 1);
      for (let i = 0; i < 2; i++) {
        const mat = new THREE.MeshBasicMaterial({ map: mountainTex, transparent: true, opacity: 0.55, depthWrite: false });
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(150, 12), mat);
        mesh.position.set(0, 40 + i * 3.0, -260 - i * 140);
        mesh.renderOrder = -2;
        scene.add(mesh);
        mountainPlanes.push(mesh);
      }

      // distant skyline blocks (light misty)
      for (let i = 0; i < 26; i++) {
        const w = 1 + Math.random() * 2.5;
        const h = 2 + Math.random() * 5.5;
        const d = 1 + Math.random() * 2.5;
        const mat = new THREE.MeshStandardMaterial({
          color: 0x9eb8c8,
          emissive: 0x8bb0c6,
          emissiveIntensity: 0.4,
          transparent: true,
          opacity: 0.7
        });
        const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        const side = Math.random() < 0.5 ? -1 : 1;
        box.position.set(side * (roadWidth / 2 + 11 + Math.random() * 12), h / 2 + 14, -160 - Math.random() * 220);
        box.renderOrder = -1;
        scene.add(box);
        farBuildings.push(box);
      }

      playerSprite = makeSprite(textures.idle[0]);
      playerSprite.position.set(0, surfaceY + 0.2, playerZ);
      playerSprite.scale.set(2.7, 2.7, 1);
      scene.add(playerSprite);

      bulletGeom = new THREE.SphereGeometry(0.12, 8, 8);
      bulletMat = new THREE.MeshBasicMaterial({ color: 0xfff27a });
      bulletMatCharged = new THREE.MeshBasicMaterial({ color: 0x66f2ff });
      enemyBulletGeom = new THREE.SphereGeometry(0.1, 8, 8);
      enemyBulletMat = new THREE.MeshBasicMaterial({ color: 0xff6b6b });
      powerupStyles.shield = {
        geom: new THREE.TorusGeometry(0.4, 0.12, 8, 16),
        mat: new THREE.MeshStandardMaterial({ color: 0x66f2ff, emissive: 0x66f2ff, emissiveIntensity: 0.6 })
      };
      powerupStyles.ammo = {
        geom: new THREE.BoxGeometry(0.5, 0.5, 0.5),
        mat: new THREE.MeshStandardMaterial({ color: 0xffa500, emissive: 0xffa500, emissiveIntensity: 0.6 })
      };
      powerupStyles.health = {
        geom: new THREE.OctahedronGeometry(0.45, 0),
        mat: new THREE.MeshStandardMaterial({ color: 0xff4466, emissive: 0xff4466, emissiveIntensity: 0.6 })
      };

      shieldMesh = new THREE.Mesh(
        new THREE.TorusGeometry(1.1, 0.08, 8, 20),
        new THREE.MeshBasicMaterial({ color: 0x66f2ff, transparent: true, opacity: 0.55 })
      );
      shieldMesh.rotation.x = Math.PI / 2;
      shieldMesh.visible = false;
      scene.add(shieldMesh);

      // roadside props
      for (let i = 0; i < 64; i++) {
        const prop = makeProp();
        prop.position.set((Math.random() < 0.5 ? -1 : 1) * (roadVisualWidth / 2 + 1.4 + Math.random() * 2.2), 0.5, -10 - Math.random() * 140);
        scene.add(prop);
        state.props.push(prop);
      }

      resizeRenderer();
      setupInput();
      updateHealthBar();
      requestAnimationFrame(loop);
    }

    function makeSprite(tex) {
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      mat.depthTest = false;
      mat.depthWrite = false;
      return new THREE.Sprite(mat);
    }

    function initAudio() {
      if (audio) return;
      audio = {
        bgm: new Audio(ASSETS.audio.bgm),
        engine: new Audio(ASSETS.audio.engine),
        shoot: new Audio(ASSETS.audio.shoot),
        hit: new Audio(ASSETS.audio.hit),
        overcharge: new Audio(ASSETS.audio.overcharge),
        pickup: new Audio(ASSETS.audio.pickup),
        crash: new Audio(ASSETS.audio.crash)
      };
      audio.bgm.loop = true;
      audio.bgm.volume = 0.25;
      audio.engine.loop = true;
      audio.engine.volume = 0.35;
      audio.shoot.volume = 0.35;
      audio.hit.volume = 0.45;
      audio.overcharge.volume = 0.5;
      audio.pickup.volume = 0.45;
      audio.crash.volume = 0.6;
      applyMuted();
    }

    function applyMuted() {
      if (!audio) return;
      Object.values(audio).forEach((snd) => {
        snd.muted = state.isMuted;
      });
    }

    function playSound(name) {
      if (!audio || state.isMuted) return;
      const snd = audio[name];
      if (!snd) return;
      try {
        snd.currentTime = 0;
        snd.play();
      } catch (err) {
        // ignore autoplay errors
      }
    }

    function updateHealthBar() {
      if (!healthFill) return;
      const pct = Math.max(0, Math.min(1, state.health / state.maxHealth));
      healthFill.style.width = `${pct * 100}%`;
    }

    function makeTree() {
      const group = new THREE.Group();
      const treeType = Math.random();
      const trunkH = 0.8 + Math.random() * 0.6;
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1, 0.16, trunkH, 8),
        new THREE.MeshStandardMaterial({ color: treeType < 0.5 ? 0x7b5a3c : 0x6b4e35 })
      );
      trunk.position.y = trunkH / 2;
      group.add(trunk);
      if (treeType < 0.4) {
        // pine tree (cone)
        const crownColors = [0x2e8b40, 0x3e9b52, 0x358a48];
        const crown = new THREE.Mesh(
          new THREE.ConeGeometry(0.7 + Math.random() * 0.3, 1.6 + Math.random() * 0.5, 10),
          new THREE.MeshStandardMaterial({ color: crownColors[Math.floor(Math.random() * crownColors.length)] })
        );
        crown.position.y = trunkH + 0.6;
        group.add(crown);
      } else if (treeType < 0.7) {
        // round leafy tree (sphere)
        const crown = new THREE.Mesh(
          new THREE.SphereGeometry(0.7 + Math.random() * 0.3, 10, 8),
          new THREE.MeshStandardMaterial({ color: 0x4caf50 })
        );
        crown.position.y = trunkH + 0.5;
        group.add(crown);
      } else {
        // layered pine (two cones)
        const c1 = new THREE.Mesh(
          new THREE.ConeGeometry(0.8, 1.2, 10),
          new THREE.MeshStandardMaterial({ color: 0x2d7a3a })
        );
        c1.position.y = trunkH + 0.3;
        const c2 = new THREE.Mesh(
          new THREE.ConeGeometry(0.55, 0.9, 10),
          new THREE.MeshStandardMaterial({ color: 0x3a9c4e })
        );
        c2.position.y = trunkH + 1.0;
        group.add(c1, c2);
      }
      return group;
    }

    function makeBush() {
      const group = new THREE.Group();
      const bushColors = [0x4fae62, 0x5cb85c, 0x3d9b4f];
      const color = bushColors[Math.floor(Math.random() * bushColors.length)];
      const main = new THREE.Mesh(
        new THREE.SphereGeometry(0.45 + Math.random() * 0.2, 10, 8),
        new THREE.MeshStandardMaterial({ color })
      );
      main.position.y = 0.35;
      group.add(main);
      // add a side lobe for fullness
      const side = new THREE.Mesh(
        new THREE.SphereGeometry(0.3 + Math.random() * 0.15, 8, 6),
        new THREE.MeshStandardMaterial({ color })
      );
      side.position.set(0.25, 0.25, 0.1);
      group.add(side);
      // occasional flower dot on bush
      if (Math.random() < 0.35) {
        const flowerColors = [0xff6b9d, 0xffd93d, 0xc084fc];
        const flower = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 6, 6),
          new THREE.MeshStandardMaterial({ color: flowerColors[Math.floor(Math.random() * flowerColors.length)], emissive: 0x222222, emissiveIntensity: 0.3 })
        );
        flower.position.set(Math.random() * 0.3 - 0.15, 0.5, Math.random() * 0.2);
        group.add(flower);
      }
      return group;
    }

    function makeRock() {
      const rock = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.25 + Math.random() * 0.2, 0),
        new THREE.MeshStandardMaterial({ color: 0x8a9bae, roughness: 0.9 })
      );
      rock.position.y = 0.2;
      rock.rotation.set(Math.random(), Math.random(), 0);
      return rock;
    }

    function makeProp() {
      const roll = Math.random();
      if (roll < 0.5) return makeTree();
      if (roll < 0.72) return makeBush();
      if (roll < 0.82) return makeRock();
      const group = new THREE.Group();
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.05, 1.2, 8),
        new THREE.MeshStandardMaterial({ color: 0xb0c7d6 })
      );
      pole.position.y = 0.6;
      const sign = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.4, 0.1),
        new THREE.MeshStandardMaterial({ color: Math.random() < 0.5 ? 0x56dcff : 0xffb347 })
      );
      sign.position.y = 1.1;
      group.add(pole, sign);
      return group;
    }

    function laneX() {
      const lanes = [-0.45, -0.2, 0, 0.2, 0.45];
      return lanes[Math.floor(Math.random() * lanes.length)] * roadWidth;
    }

    function createEnemy() {
      const tex = textures.enemies[Math.floor(Math.random() * textures.enemies.length)];
      const enemy = makeSprite(tex);
      enemy.scale.set(3.2, 3.2, 1);
      scene.add(enemy);
      return { sprite: enemy, shootTimer: 0, pattern: "aim" };
    }

    function pickPattern() {
      let patterns = ["aim"];
      if (state.time > 25) patterns = ["aim", "burst"];
      if (state.time > 60) patterns = ["aim", "burst", "scatter"];
      return patterns[Math.floor(Math.random() * patterns.length)];
    }

    function resetEnemy(enemy) {
      if (state.enemySpawnZ < -240) state.enemySpawnZ = -60;
      enemy.sprite.position.set(laneX(), surfaceY + 0.2, state.enemySpawnZ + (Math.random() * 6 - 3));
      state.enemySpawnZ -= 15;
      enemy.pattern = pickPattern();
      const baseDelay = state.time < 30 ? 2.0 : state.time < 60 ? 1.4 : state.time < 90 ? 1.1 : 0.9;
      enemy.shootTimer = baseDelay + Math.random() * 0.8;
    }

    function spawnBullet(charged) {
      const bullet = new THREE.Mesh(bulletGeom, charged ? bulletMatCharged : bulletMat);
      bullet.position.set(state.playerX, surfaceY + 0.25, playerZ - 1.2);
      bullet.scale.setScalar(charged ? 2.8 : 1.0);
      bullet.userData = {
        speedMult: charged ? 3.4 : 2.2,
        pierce: charged ? 2 : 0,
        blastRadius: charged ? 3.4 : 1.0
      };
      scene.add(bullet);
      state.bullets.push(bullet);
    }

    function spawnEnemyBulletAt(enemy, vx, vz) {
      const bullet = new THREE.Mesh(enemyBulletGeom, enemyBulletMat);
      bullet.position.set(enemy.sprite.position.x, surfaceY + 0.25, enemy.sprite.position.z);
      bullet.userData = { vx, vz };
      scene.add(bullet);
      state.enemyBullets.push(bullet);
    }

    function fireEnemy(enemy, moveSpeed) {
      const lead = state.playerX + state.steerVel * 0.35;
      const dx = lead - enemy.sprite.position.x;
      const dz = playerZ - enemy.sprite.position.z;
      const len = Math.max(0.001, Math.hypot(dx, dz));
      const shotSpeed = Math.max(12, moveSpeed + 10);
      const baseVx = (dx / len) * shotSpeed;
      const baseVz = (dz / len) * shotSpeed;
      if (enemy.pattern === "burst") {
        spawnEnemyBulletAt(enemy, baseVx, baseVz);
        spawnEnemyBulletAt(enemy, baseVx + 0.9, baseVz);
        spawnEnemyBulletAt(enemy, baseVx - 0.9, baseVz);
      } else if (enemy.pattern === "scatter") {
        spawnEnemyBulletAt(enemy, baseVx + (Math.random() * 2 - 1) * 1.6, baseVz);
      } else {
        spawnEnemyBulletAt(enemy, baseVx, baseVz);
      }
    }

    function shoot() {
      if (state.mode !== "play") return;
      if (state.shootCooldown > 0) return;
      const ammoCost = state.overcharge > 0 ? 2 : 1;
      if (state.ammo < ammoCost) return;
      const charged = state.overcharge > 0;
      state.shootCooldown = charged ? 0.18 : 0.25;
      state.ammo = Math.max(0, state.ammo - ammoCost);
      spawnBullet(charged);
      playSound("shoot");
      if (charged) {
        state.overcharge = Math.max(0, state.overcharge - 0.35);
      }
      window.FarcadeSDK?.hapticFeedback();
    }

    function spawnPowerup() {
      let type = "shield";
      const roll = Math.random();
      if (state.ammo <= 4 && roll < 0.6) type = "ammo";
      else if (state.health < state.maxHealth * 0.6 && roll < 0.8) type = "health";
      else if (roll < 0.4) type = "ammo";
      else if (roll < 0.7) type = "health";
      const style = powerupStyles[type];
      const orb = new THREE.Mesh(style.geom, style.mat);
      orb.position.set((Math.random() * 2 - 1) * (roadWidth * 0.4), surfaceY + 0.5, -50 - Math.random() * 80);
      orb.userData = { type, spin: Math.random() * 2 + 0.5 };
      scene.add(orb);
      state.powerups.push(orb);
    }

    function setupInput() {
      frame.addEventListener("pointerdown", (e) => {
        if (tryStart()) return;
        updateTargetFromPointer(e);
        shoot();
      });
      frame.addEventListener("pointermove", (e) => {
        if (state.mode !== "play" || e.buttons === 0) return;
        updateTargetFromPointer(e);
      });
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") state.targetX -= 0.5;
        if (e.key === "ArrowRight") state.targetX += 0.5;
        if (e.key === " " || e.key === "Spacebar") shoot();
        if (e.key === "f") toggleFullscreen();
      });
      overlay.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        tryStart();
      });
      window.addEventListener("resize", resizeRenderer);
    }

    function updateTargetFromPointer(e) {
      const rect = frame.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const norm = x * 2 - 1;
      state.targetX = norm * (roadWidth * 0.45);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        frame.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    function resizeRenderer() {
      if (!renderer) return;
      const rect = frame.getBoundingClientRect();
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / rect.height;
      camera.updateProjectionMatrix();
    }

    function tryStart() {
      if (state.mode !== "play") {
        resetGame();
        return true;
      }
      return false;
    }

    function resetGame() {
      state.mode = "play";
      state.time = 0;
      state.distance = 0;
      state.playerX = 0;
      state.targetX = 0;
      state.steerVel = 0;
      state.charge = 0;
      state.overcharge = 0;
      state.energyFrame = 0;
      state.energyTimer = 0;
      state.shootCooldown = 0;
      state.ammo = state.maxAmmo;
      state.health = state.maxHealth;
      state.damageCooldown = 0;
      state.shieldTime = 0;
      state.shieldHits = 0;
      state.lastEnemySeenTime = 0;
      state.enemySpawnZ = -30;
      state.enemies.forEach((e) => scene.remove(e.sprite));
      state.enemies = [];
      for (let i = 0; i < 14; i++) {
        const enemy = createEnemy();
        enemy.sprite.position.set(laneX(), surfaceY + 0.2, state.enemySpawnZ);
        enemy.pattern = "aim";
        enemy.shootTimer = 0.9 + Math.random() * 0.6;
        state.enemySpawnZ -= 15;
        state.enemies.push(enemy);
      }
      state.bullets.forEach((b) => scene.remove(b));
      state.bullets = [];
      state.enemyBullets.forEach((b) => scene.remove(b));
      state.enemyBullets = [];
      state.powerups.forEach((p) => scene.remove(p));
      state.powerups = [];
      initAudio();
      if (audio) {
        audio.bgm.currentTime = 0;
        audio.bgm.play().catch(() => {});
        audio.engine.currentTime = 0;
        audio.engine.play().catch(() => {});
      }
      overlay.classList.add("hidden");
      updateHealthBar();
    }

    function gameOver() {
      if (state.mode !== "play") return;
      state.mode = "over";
      if (audio) {
        audio.engine.pause();
        audio.bgm.pause();
      }
      playSound("crash");
      window.FarcadeSDK?.singlePlayer?.actions.gameOver({ score: Math.floor(state.distance) });
    }

    function damagePlayer() {
      if (state.damageCooldown > 0 || state.mode !== "play") return;
      if (state.shieldTime > 0) {
        state.shieldHits = Math.max(0, state.shieldHits - 1);
        state.damageCooldown = 0.4;
        window.FarcadeSDK?.hapticFeedback();
        return;
      }
      const dmg = state.time < 30 ? 8 : state.time < 60 ? 12 : 20;
      state.health = Math.max(0, state.health - dmg);
      state.damageCooldown = 1.0;
      updateHealthBar();
      playSound("hit");
      window.FarcadeSDK?.hapticFeedback();
      if (state.health <= 0) {
        gameOver();
      }
    }

    function update(dt) {
      if (state.mode !== "play") return;
      state.time += dt;
      const speedBoost = state.overcharge > 0 ? 8 : 0;
      const moveSpeed = state.speed + speedBoost;
      state.distance += moveSpeed * dt * 10;

      // infinite run - no finish line

      const activeEnemies = Math.min(state.enemies.length, 8 + Math.floor(state.time / 30));
      if (state.powerups.length < 1 && Math.random() < 0.004) spawnPowerup();

      state.shootCooldown = Math.max(0, state.shootCooldown - dt);
      state.damageCooldown = Math.max(0, state.damageCooldown - dt);
      state.shieldTime = Math.max(0, state.shieldTime - dt);
      if (state.shieldTime <= 0) state.shieldHits = 0;

      if (state.overcharge <= 0) {
        state.charge = Math.min(1, state.charge + dt * 0.08);
        if (state.charge >= 1) {
          state.overcharge = 3.5;
          state.charge = 0;
          playSound("overcharge");
          window.FarcadeSDK?.hapticFeedback();
        }
      } else {
        state.overcharge -= dt;
      }

      const steerDiff = state.targetX - state.playerX;
      state.steerVel += steerDiff * dt * 6;
      state.steerVel *= 0.85;
      state.playerX += state.steerVel * dt * 4;
      const clamp = roadWidth * 0.45;
      state.playerX = Math.max(-clamp, Math.min(clamp, state.playerX));

      playerSprite.position.x = state.playerX;
      playerSprite.position.y = surfaceY + 0.2;
      playerSprite.material.opacity = state.damageCooldown > 0 ? 0.6 : 1.0;
      if (shieldMesh) {
        shieldMesh.visible = state.shieldTime > 0;
        shieldMesh.position.set(state.playerX, surfaceY + 0.25, playerZ);
        shieldMesh.rotation.z += dt * 2;
      }

      // subtle camera parallax
      camera.position.x = state.playerX * 0.08;
      camera.lookAt(state.playerX * 0.05, 1.5, -30);
      if (skyDome) skyDome.position.copy(camera.position);
      if (sunMesh) sunMesh.position.x = 30 + state.playerX * 0.2;

      // move textures to simulate speed
      if (roadMesh?.material?.map) {
        roadMesh.material.map.offset.y = (roadMesh.material.map.offset.y - moveSpeed * dt * 0.02) % 1;
      }
      if (groundMesh?.material?.map) {
        groundMesh.material.map.offset.y = (groundMesh.material.map.offset.y - moveSpeed * dt * 0.01) % 1;
      }

      if (roadSegments.length) {
        const wrap = roadSegmentLength * roadSegments.length;
        roadSegments.forEach((seg) => {
          seg.position.z += moveSpeed * dt;
          if (seg.position.z > roadLead) {
            seg.position.z -= wrap;
          }
        });
      }

      if (grassChunks.length && grassSegmentCount > 0) {
        const wrap = grassSegmentLength * grassSegmentCount;
        grassChunks.forEach((chunk) => {
          chunk.position.z += moveSpeed * dt;
          if (chunk.position.z > roadLead) {
            chunk.position.z -= wrap;
          }
        });
      }

      // update bullets
      for (let i = state.bullets.length - 1; i >= 0; i--) {
        const bullet = state.bullets[i];
        const speedMult = bullet.userData?.speedMult || 2.2;
        bullet.position.z -= moveSpeed * dt * speedMult;
        if (bullet.position.z < -140) {
          scene.remove(bullet);
          state.bullets.splice(i, 1);
        }
      }

      // update enemies
      let visibleCount = 0;
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const enemy = state.enemies[i];
        if (i >= activeEnemies) {
          enemy.sprite.visible = false;
          enemy.sprite.position.z = -300 - i * 20;
          continue;
        }
        enemy.sprite.visible = true;
        enemy.sprite.position.z += moveSpeed * dt;
        enemy.sprite.position.y = surfaceY + 0.2;
        if (enemy.sprite.position.z < -8 && enemy.sprite.position.z > -150) {
          visibleCount += 1;
        }
        if (enemy.sprite.position.z > 6) {
          resetEnemy(enemy);
          continue;
        }
        if (Math.abs(enemy.sprite.position.z - playerZ) < 1.4 && Math.abs(enemy.sprite.position.x - state.playerX) < 1.3) {
          if (state.overcharge > 0) {
            resetEnemy(enemy);
            playSound("hit");
            window.FarcadeSDK?.hapticFeedback();
          } else {
            damagePlayer();
            break;
          }
        }
        enemy.shootTimer -= dt;
        if (enemy.shootTimer <= 0 && enemy.sprite.position.z < -6 && enemy.sprite.position.z > -120) {
          fireEnemy(enemy, moveSpeed);
          const refresh = state.time < 30 ? 2.0 : state.time < 60 ? 1.4 : state.time < 90 ? 1.1 : 0.9;
          enemy.shootTimer = refresh + Math.random() * 0.8;
        }
      }

      if (visibleCount > 0) {
        state.lastEnemySeenTime = state.time;
      }
      if ((visibleCount === 0 && state.time - state.lastEnemySeenTime > 0.6) || visibleCount < 2) {
        // Force enemies back into view to avoid dead air.
        let injected = 0;
        for (let i = 0; i < activeEnemies && injected < 3; i++) {
          const enemy = state.enemies[i];
          if (enemy.sprite.position.z > -8 || enemy.sprite.position.z < -150) {
            enemy.sprite.position.set(laneX(), surfaceY + 0.2, -50 - injected * 16);
            enemy.pattern = pickPattern();
            enemy.shootTimer = 0.7 + Math.random() * 0.4;
            injected += 1;
          }
        }
        if (visibleCount === 0) state.lastEnemySeenTime = state.time;
      }

      // bullet vs enemy collisions (charged bullets have larger blast)
      for (let j = state.bullets.length - 1; j >= 0; j--) {
        const bullet = state.bullets[j];
        const blast = bullet.userData?.blastRadius || 1.0;
        let hit = false;
        for (let i = state.enemies.length - 1; i >= 0; i--) {
          const enemy = state.enemies[i];
          const dx = enemy.sprite.position.x - bullet.position.x;
          const dz = enemy.sprite.position.z - bullet.position.z;
          const dist = Math.hypot(dx, dz);
          if (dist < blast) {
            resetEnemy(enemy);
            hit = true;
          }
        }
        if (hit) {
          playSound("hit");
          const pierce = bullet.userData?.pierce || 0;
          if (pierce > 0) {
            bullet.userData.pierce -= 1;
            bullet.scale.multiplyScalar(0.85);
          } else {
            scene.remove(bullet);
            state.bullets.splice(j, 1);
          }
          window.FarcadeSDK?.hapticFeedback();
        }
      }

      // enemy bullets
      for (let i = state.enemyBullets.length - 1; i >= 0; i--) {
        const bullet = state.enemyBullets[i];
        bullet.position.x += bullet.userData.vx * dt;
        bullet.position.z += bullet.userData.vz * dt;
        bullet.position.y = surfaceY + 0.25;
        if (bullet.position.z > 6 || bullet.position.z < -160) {
          scene.remove(bullet);
          state.enemyBullets.splice(i, 1);
          continue;
        }
        if (Math.abs(bullet.position.z - playerZ) < 1.0 && Math.abs(bullet.position.x - state.playerX) < 1.0) {
          scene.remove(bullet);
          state.enemyBullets.splice(i, 1);
          damagePlayer();
        }
      }

      // powerups
      for (let i = state.powerups.length - 1; i >= 0; i--) {
        const orb = state.powerups[i];
        orb.position.z += moveSpeed * dt;
        orb.position.y = surfaceY + 0.5;
        orb.rotation.y += (orb.userData.spin || 1) * dt;
        if (orb.position.z > 8) {
          scene.remove(orb);
          state.powerups.splice(i, 1);
          continue;
        }
        if (Math.abs(orb.position.z - playerZ) < 1.3 && Math.abs(orb.position.x - state.playerX) < 1.1) {
          scene.remove(orb);
          state.powerups.splice(i, 1);
          if (orb.userData.type === "shield") {
            state.shieldTime = 14;
            state.shieldHits = 6;
            shieldMesh.visible = true;
          } else if (orb.userData.type === "ammo") {
            state.ammo = state.maxAmmo;
          } else if (orb.userData.type === "health") {
            state.health = state.maxHealth;
            updateHealthBar();
          }
          playSound("pickup");
          window.FarcadeSDK?.hapticFeedback();
        }
      }

      // update props
      state.props.forEach((prop) => {
        prop.position.z += moveSpeed * dt;
        if (prop.position.z > 8) {
          prop.position.z = -140 - Math.random() * 100;
          prop.position.x = (Math.random() < 0.5 ? -1 : 1) * (roadVisualWidth / 2 + 1.4 + Math.random() * 2.2);
        }
      });

      // update distant buildings (slow parallax)
      farBuildings.forEach((b) => {
        b.position.z += moveSpeed * dt * 0.25;
        if (b.position.z > 20) {
          const side = Math.random() < 0.5 ? -1 : 1;
          b.position.z = -220 - Math.random() * 240;
          b.position.x = side * (roadWidth / 2 + 11 + Math.random() * 12);
        }
      });

      mountainPlanes.forEach((m) => {
        m.position.z += moveSpeed * dt * 0.08;
        if (m.position.z > -80) {
          m.position.z = -260 - Math.random() * 160;
        }
      });

      hillSegments.forEach((h) => {
        h.mesh.position.z += moveSpeed * dt * h.speed;
        if (h.mesh.position.z > 20) {
          const side = Math.random() < 0.5 ? -1 : 1;
          h.mesh.position.z = -220 - Math.random() * 180;
          h.mesh.position.x = side * (roadWidth / 2 + 12 + Math.random() * 10);
        }
      });

      // player sprite animation
      if (state.mode === "over") {
        playerSprite.material.map = textures.stop;
      } else if (state.playerX < -1) {
        playerSprite.material.map = textures.left;
      } else if (state.playerX > 1) {
        playerSprite.material.map = textures.right;
      } else if (state.overcharge > 0) {
        const idx = Math.floor(state.time * 10) % textures.fast.length;
        playerSprite.material.map = textures.fast[idx];
      } else {
        const idx = Math.floor(state.time * 8) % textures.idle.length;
        playerSprite.material.map = textures.idle[idx];
      }
      playerSprite.material.needsUpdate = true;

      scoreEl.textContent = `DIST ${Math.floor(state.distance)}m  TIME ${state.time.toFixed(1)}s  AMMO ${state.ammo}`;

      state.energyTimer += dt;
      if (state.energyTimer > 0.12) {
        state.energyTimer = 0;
        state.energyFrame = (state.energyFrame + 1) % 6;
      }
      const frames = state.overcharge > 0 ? ASSETS.energy.over : ASSETS.energy.normal;
      if (frames.length) energyEl.src = frames[state.energyFrame % frames.length];
    }

    function render() {
      renderer.render(scene, camera);
    }

    let lastTime = null;
    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.033, (ts - lastTime) / 1000);
      lastTime = ts;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    window.advanceTime = (ms) => {
      const steps = Math.max(1, Math.round(ms / (1000 / 60)));
      for (let i = 0; i < steps; i++) update(1 / 60);
      render();
    };

    window.render_game_to_text = () => {
      const payload = {
        mode: state.mode,
        distance: state.distance,
        time: state.time,
        player: { x: state.playerX, z: playerZ },
        enemies: state.enemies.map((e) => ({ x: e.sprite.position.x, z: e.sprite.position.z })),
        bullets: state.bullets.map((b) => ({ x: b.position.x, z: b.position.z })),
        enemyBullets: state.enemyBullets.map((b) => ({ x: b.position.x, z: b.position.z })),
        powerups: state.powerups.map((p) => ({ x: p.position.x, z: p.position.z, type: p.userData?.type })),
        overcharge: state.overcharge > 0,
        overchargeTime: state.overcharge,
        shootReady: state.shootCooldown <= 0,
        ammo: state.ammo,
        health: state.health,
        shieldTime: state.shieldTime,
        shieldHits: state.shieldHits,
        coords: "x is left/right (road), z increases toward camera"
      };
      return JSON.stringify(payload);
    };

    window.FarcadeSDK?.onPlayAgain(() => {
      resetGame();
    });

    window.FarcadeSDK?.onToggleMute((data) => {
      state.isMuted = !!data.isMuted;
      applyMuted();
    });

    loadTextures()
      .catch((err) => {
        console.warn("Texture load issue", err);
      })
      .finally(() => {
        if (ASSETS.energy.normal.length) energyEl.src = ASSETS.energy.normal[0];
        initScene();
      });
  </script>
</body>
